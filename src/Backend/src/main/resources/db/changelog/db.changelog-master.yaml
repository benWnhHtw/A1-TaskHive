databaseChangeLog:
  - changeSet:
      id: 2
      author: Astemir Sheriev
      changes:
        - createTable:
            tableName: person
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: vorname
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: erreichbarkeit
                  type: boolean
              - column:
                  name: age
                  type: smallint
              - column:
                  type: bigint
                  name: zimmerNr
                  constraints:
                    nullable: false


  - changeSet:
        id: 3
        author: Alina Petrenko
        changes:
            - createTable:
                  tableName: aufgabe
                  columns:
                      - column:
                            name: id
                            type: BIGINT
                            constraints:
                                primaryKey: true
                                nullable: false

                      - column:
                            name: titel
                            type: VARCHAR(255)
                            constraints:
                                nullable: false

                      - column:
                            name: beschreibung
                            type: VARCHAR(500)

                      - column:
                            name: faelligkeitsdatum
                            type: date

                      - column:
                            name: status
                            type: VARCHAR(50)
                            constraints:
                                nullable: false


  - changeSet:
        id: 4
        author: Alina Petrenko

        changes:
            - createTable:
                  tableName: person_aufgabe

                  columns:
                      - column:
                            name: person_id
                            type: BIGINT
                            constraints:
                                nullable: false

                      - column:
                            name: aufgabe_id
                            type: BIGINT
                            constraints:
                                nullable: false

            - addForeignKeyConstraint:
                  baseTableName: person_aufgabe
                  baseColumnNames: person_id
                  referencedTableName: person
                  referencedColumnNames: id
                  constraintName: fk_person_aufgabe_person

            - addForeignKeyConstraint:
                  baseTableName: person_aufgabe
                  baseColumnNames: aufgabe_id
                  referencedTableName: aufgabe
                  referencedColumnNames: id
                  constraintName: fk_person_aufgabe_aufgabe
                    # Zimmer Tabelle
  - changeSet:
      id: 5
      author: Sirri Metuge
      changes:
        - createTable:
            tableName: zimmer
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: zimmer_nr
                  type: INT

              - column:
                  name: person_id
                  type: BIGINT

              - column:
                  name: wg_nr
                  type: BIGINT
  - changeSet:
        id: 6
        author: Astemir Sheriev
        changes:

            - renameColumn:
                  tableName: person
                  oldColumnName: zimmerNr
                  newColumnName: zimmer_id
                  columnDataType: BIGINT

            - addForeignKeyConstraint:
                  baseTableName: person
                  baseColumnNames: zimmer_id
                  referencedTableName: zimmer
                  referencedColumnNames: id
                  constraintName: fk_person_zimmer
